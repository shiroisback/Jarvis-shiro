                    <div class="semi_arc_3 e5_2">
                        <div class="semi_arc_3 e5_3">
                            <div class="semi_arc_3 e5_4"></div>
                        </div>
                    </div>
                </div>
                <div class="core2"></div>
            </div>
            <ul class="marks" id="marks-ring"></ul>
        </div>
    </div>
</div>

<script src="./main.js"></script>
</body>
</html>
